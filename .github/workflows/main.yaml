name: Build and Test Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    name: Build & Verify Application
    runs-on: ubuntu-latest

    steps:
    - name: Check out code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas numpy scikit-learn seaborn matplotlib flask xgboost dill pytest

    - name: Verify Package Structure & Pipeline
      run: |
        python tests/test_setup.py

    - name: Build Docker Container Image
      run: |
        docker build -t heart-disease-prediction:latest .


