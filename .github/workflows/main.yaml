name: Build and Test Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    name: Build & Verify Application
    runs-on: ubuntu-latest

    steps:
    - name: Check out code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas numpy scikit-learn seaborn matplotlib flask xgboost dill pytest

    - name: Verify Package Structure & Pipeline
      run: |
        python tests/test_setup.py

    - name: Build Docker Container Image
      run: |
        docker build -t heart-disease-prediction:latest .

    - name: Configure AWS Credentials (Optional)
      if: ${{ secrets.AWS_ACCESS_KEY_ID != '' }}
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1

    - name: Login to Amazon ECR (Optional)
      if: ${{ secrets.AWS_ACCESS_KEY_ID != '' }}
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Push Image to Amazon ECR (Optional)
      if: ${{ secrets.AWS_ACCESS_KEY_ID != '' }}
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        ECR_REPOSITORY: heartdiseaseprediction
        IMAGE_TAG: latest
      run: |
        docker tag heart-disease-prediction:latest $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

